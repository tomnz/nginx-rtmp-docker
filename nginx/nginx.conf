# Default: no-transcode / passthrough.
# See nginx.transcode.conf for the multi-bitrate-transcode variant.
#
# This file is a TEMPLATE rendered at container start by docker-entrypoint.sh
# via envsubst. Only the ${VAR} placeholders listed in the entrypoint's
# envsubst allowlist are substituted — all other `$foo` references (nginx's
# own variables like $remote_addr) are preserved verbatim.

# Load RTMP and other dynamic modules provided by Alpine's nginx-mod-* packages.
include /etc/nginx/modules/*.conf;

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log info;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen [::]:${RTMP_PORT} ipv6only=off;
        wait_key on;
        wait_video on;

        # Passthrough + HLS in one application. OBS pushes to live/<name>;
        # nginx-rtmp writes /appdata/nginx/hls/<name>.m3u8 + segments directly.
        # No ffmpeg relay, no rtmp_auto_push, no cross-application hand-off.
        application live {
            live on;

            hls on;
            hls_path /appdata/nginx/hls;

            # Low-latency tuning — assumes OBS keyframe interval = 1s.
            # Each HLS segment closes on the next keyframe after hls_fragment
            # elapses, so matching these keeps segment boundaries aligned.
            hls_fragment ${HLS_FRAGMENT};
            hls_playlist_length ${HLS_PLAYLIST_LENGTH};
            hls_sync ${HLS_SYNC};
            hls_continuous on;
            play_restart on;
            publish_notify on;
        }
    }
}

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen ${HTTP_PORT} default_server;

        location /live {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range';
                add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Content-Type';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf8';
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header Cache-Control no-cache always;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Headers' 'User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Content-Type' always;

            types {
                application/x-mpegURL m3u8;
                video/MP2T ts;
            }

            # Try to boost performance a little for all these files
            sendfile on;
            aio threads;
            tcp_nopush on;
            output_buffers 4 64k;
            directio 512k;
            directio_alignment 4k;

            alias /appdata/nginx/hls;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet /static/stat.xsl;
        }

        location /static {
            alias /static;
        }

        location / {
            root /var/www;
            index index.html;
        }
    }
}
